name: Oracle ARM Hunter
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  hunt-arm:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Create OCI Config Manually
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          
          cat <<EOF > ~/.oci/config
          [DEFAULT]
          user=ocid1.user.oc1..aaaaaaaajba25qo74ktbgr3g7vwphgmjrvezgvlh3z3aydbstnu4igvwdwwq
          fingerprint=5f:ba:41:89:f3:84:42:19:81:23:76:67:88:b1:a3:06
          tenancy=ocid1.tenancy.oc1..aaaaaaaa4yolzgxkwj5q4ppjo3lfubvsftiy45m43yudwe2jgkybpjrjrphq
          region=eu-frankfurt-1
          key_file=/home/runner/.oci/key.pem
          EOF
          
          chmod 600 ~/.oci/config

      - name: Try Create ARM Instance
        env:
          MY_IMAGE_ID: ${{ secrets.IMAGE_ID }}
          MY_SUBNET_ID: ${{ secrets.SUBNET_ID }}
          MY_COMP_ID: ${{ secrets.COMPARTMENT_ID }}
          SUPPRESS_LABEL_WARNING: True # O sığır uyarıyı kapatır
        run: |
          oci compute instance launch \
            --availability-domain "UvXp:EU-FRANKFURT-1-AD-1" \
            --compartment-id "$MY_COMP_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --display-name "Binance-Bot-ARM" \
            --source-details "{\"image_id\": \"$MY_IMAGE_ID\", \"source_type\": \"image\"}" \
            --subnet-id "$MY_SUBNET_ID" \
            --assign-public-ip true
