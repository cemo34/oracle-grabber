name: Oracle ARM/AMD Hunter

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  hunt-free-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: OCI_CONFIG

    steps:
      - name: Validate required secrets
        env:
          OCI_CONFIG: ${{ secrets.OCI_CONFIG }}
          OCI_KEY_FILE: ${{ secrets.OCI_KEY_FILE }}
          SUBNET_ID: ${{ secrets.SUBNET_ID }}
          COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID }}
        run: |
          set -euo pipefail
          missing=0

          for key in SUBNET_ID COMPARTMENT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              missing=1
            fi
          done

          if [ -z "${OCI_CONFIG:-}" ] && [ -z "${OCI_KEY_FILE:-}" ]; then
            echo "Missing secret: OCI_CONFIG or OCI_KEY_FILE"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "Required secrets are missing. Add them in Environment secrets (OCI_CONFIG) and rerun."
            exit 1
          fi

      - name: Install OCI CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade oci-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create OCI config
        env:
          OCI_CONFIG: ${{ secrets.OCI_CONFIG }}
          OCI_KEY_FILE: ${{ secrets.OCI_KEY_FILE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.oci

          if [ -n "${OCI_CONFIG:-}" ]; then
            echo "$OCI_CONFIG" | tr -d '\r' > ~/.oci/config

            if grep -q '^key_file=' ~/.oci/config && [ -n "${OCI_KEY_FILE:-}" ]; then
              key_path=$(grep '^key_file=' ~/.oci/config | head -n1 | cut -d'=' -f2-)
              mkdir -p "$(dirname "$key_path")"
              echo "$OCI_KEY_FILE" | tr -d '\r' > "$key_path"
              chmod 600 "$key_path"
            fi
          else
            echo "$OCI_KEY_FILE" | tr -d '\r' > ~/.oci/key.pem
            chmod 600 ~/.oci/key.pem

            printf '%s\n' \
              '[DEFAULT]' \
              'user=ocid1.user.oc1..aaaaaaaajba25qo74ktbgr3g7vwphgmjrvezgvlh3z3aydbstnu4igvwdwwq' \
              'fingerprint=5f:ba:41:89:f3:84:42:19:81:23:76:67:88:b1:a3:06' \
              'tenancy=ocid1.tenancy.oc1..aaaaaaaa4yolzgxkwj5q4ppjo3lfubvsftiy45m43yudwe2jgkybpjrjrphq' \
              'region=eu-frankfurt-1' \
              'key_file=/home/runner/.oci/key.pem' > ~/.oci/config
          fi

          chmod 600 ~/.oci/config

      - name: Discover Ubuntu 24 image and launch ARM+AMD Free
        env:
          SUBNET_ID: ${{ secrets.SUBNET_ID }}
          COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID }}
          SUPPRESS_LABEL_WARNING: True
        run: |
          set -euo pipefail

          TENANCY_OCID=$(awk -F= '/^tenancy=/{print $2; exit}' ~/.oci/config | tr -d '[:space:]')
          if [ -z "$TENANCY_OCID" ]; then
            echo "Could not determine tenancy OCID from ~/.oci/config"
            exit 1
          fi

          AD_LIST=$(oci iam availability-domain list \
            --compartment-id "$TENANCY_OCID" \
            --query 'data[].name' \
            --raw-output)

          if [ -z "$AD_LIST" ]; then
            echo "Could not fetch availability domains."
            exit 1
          fi

          echo "AD candidates:"
          echo "$AD_LIST"

          # target|shape|shape_config|display_name
          TARGETS=$(cat <<'TXT'
          arm|VM.Standard.A1.Flex|{"ocpus": 4, "memoryInGBs": 24}|Binance-Bot-ARM-Ubuntu24
          amd|VM.Standard.E2.1.Micro||Binance-Bot-AMD-Free-Ubuntu24
          TXT
          )

          launched=0
          image_missing_count=0

          while IFS='|' read -r target shape shape_cfg display_name; do
            [ -z "$target" ] && continue
            echo "=== Target: $target / Shape: $shape ==="

            # 1) Strict search: Ubuntu 24.04 + shape compatible
            image_id=$(oci compute image list \
              --compartment-id "$TENANCY_OCID" \
              --all \
              --shape "$shape" \
              --operating-system "Canonical Ubuntu" \
              --operating-system-version "24.04" \
              --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE'], &\"time-created\"))[0].id" \
              --raw-output)

            # 2) Fallback search: display-name contains Ubuntu and 24.04
            if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
              echo "Strict Ubuntu 24.04 image not found, trying fallback filter..."
              image_id=$(oci compute image list \
                --compartment-id "$TENANCY_OCID" \
                --all \
                --shape "$shape" \
                --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE' && contains(\"display-name\", 'Ubuntu') && contains(\"display-name\", '24.04')], &\"time-created\"))[0].id" \
                --raw-output)
            fi

            if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
              echo "No Ubuntu 24 image found for shape: $shape (target=$target)."
              image_missing_count=$((image_missing_count + 1))
              continue
            fi

            echo "Resolved image for $target: ${image_id:0:42}..."

            # Sanity validation
            set +e
            oci compute image get --image-id "$image_id" >/tmp/image_get_${target}.json 2>/tmp/image_get_${target}.err
            img_code=$?
            set -e
            if [ "$img_code" -ne 0 ]; then
              echo "Resolved image invalid for $target:"
              cat /tmp/image_get_${target}.err || true
              image_missing_count=$((image_missing_count + 1))
              continue
            fi

            # Try all ADs for this target
            target_launched=0
            while IFS= read -r ad; do
              [ -z "$ad" ] && continue
              echo "Trying $target in AD: $ad"

              cmd=(oci compute instance launch
                --availability-domain "$ad"
                --compartment-id "$COMPARTMENT_ID"
                --shape "$shape"
                --display-name "$display_name"
                --source-details "{\"image_id\": \"$image_id\", \"source_type\": \"image\"}"
                --subnet-id "$SUBNET_ID"
                --assign-public-ip true)

              if [ -n "$shape_cfg" ]; then
                cmd+=(--shape-config "$shape_cfg")
              fi

              set +e
              output=$("${cmd[@]}" 2>&1)
              code=$?
              set -e

              if [ "$code" -eq 0 ]; then
                echo "Launch SUCCESS ($target, $ad)"
                echo "$output"
                launched=1
                target_launched=1
                break
              fi

              echo "Launch failed ($target, $ad):"
              echo "$output"

              if echo "$output" | grep -qiE 'OutOfHostCapacity|Out of host capacity|Out of capacity'; then
                echo "Capacity yok, sonraki AD denenecek."
                continue
              fi

              if echo "$output" | grep -qiE 'LimitExceeded|TooManyRequests|ServiceError'; then
                echo "Geçici/limit kaynaklı hata, sonraki AD denenecek."
                continue
              fi

              echo "Beklenmeyen hata nedeniyle workflow fail ediliyor."
              exit "$code"
            done <<< "$AD_LIST"

            if [ "$target_launched" -eq 1 ]; then
              # Bir hedefte başarılı olunca diğerini denemeye gerek yok
              break
            fi
          done <<< "$TARGETS"

          if [ "$launched" -eq 1 ]; then
            echo "At least one target launched successfully."
            exit 0
          fi

          if [ "$image_missing_count" -ge 2 ]; then
            echo "Neither ARM nor AMD target could find Ubuntu 24 image. Check region/image availability."
            exit 1
          fi

          echo "No capacity now. Workflow başarılı bitti, 5 dk sonra tekrar denenecek."
          exit 0
