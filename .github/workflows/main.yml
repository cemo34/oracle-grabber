name: Oracle Capacity Hunter

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: oracle-capacity-hunter-main
  cancel-in-progress: false

jobs:
  hunt-capacity:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    env:
      SUBNET_ID: ${{ secrets.SUBNET_ID || vars.SUBNET_ID }}
      COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID || vars.COMPARTMENT_ID }}
      VM_SSH_PUBLIC_KEY: ${{ secrets.VM_SSH_PUBLIC_KEY || vars.VM_SSH_PUBLIC_KEY }}

      # Preferred mode
      OCI_CONFIG_SECRET: ${{ secrets.OCI_CONFIG || vars.OCI_CONFIG }}
      OCI_KEY_FILE_SECRET: ${{ secrets.OCI_KEY_FILE || vars.OCI_KEY_FILE }}

      # Backward-compatible split mode
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID || vars.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID || vars.OCI_TENANCY_OCID }}
      OCI_REGION: ${{ secrets.OCI_REGION || vars.OCI_REGION }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT || vars.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY || vars.OCI_PRIVATE_KEY }}

      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      SUPPRESS_LABEL_WARNING: "true"

    steps:
      - name: Ensure Python is available
        run: |
          set -euo pipefail
          python3 --version

      - name: Install OCI CLI
        run: |
          set -euo pipefail
          python3 -m pip install --user --disable-pip-version-check --prefer-binary oci-cli==3.76.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          oci --version

      - name: Validate inputs
        run: |
          set -euo pipefail

          have_full=0
          if [ -n "${OCI_CONFIG_SECRET:-}" ] && [ -n "${OCI_KEY_FILE_SECRET:-}" ]; then
            have_full=1
          fi

          have_split=0
          if [ -n "${OCI_USER_OCID:-}" ] && [ -n "${OCI_TENANCY_OCID:-}" ] && [ -n "${OCI_REGION:-}" ] && [ -n "${OCI_FINGERPRINT:-}" ] && [ -n "${OCI_PRIVATE_KEY:-}" ]; then
            have_split=1
          fi

          if [ "$have_full" -eq 0 ] && [ "$have_split" -eq 0 ]; then
            echo "Missing OCI credentials. Provide either:"
            echo "1) OCI_CONFIG + OCI_KEY_FILE"
            echo "or"
            echo "2) OCI_USER_OCID + OCI_TENANCY_OCID + OCI_REGION + OCI_FINGERPRINT + OCI_PRIVATE_KEY"
            exit 1
          fi

          if [ -z "${COMPARTMENT_ID:-}" ]; then
            echo "COMPARTMENT_ID not provided. Will fallback to tenancy OCID from OCI config."
          fi

          if [ -z "${SUBNET_ID:-}" ]; then
            echo "SUBNET_ID not provided. Will auto-discover a public subnet in target compartment."
          fi

          if [ -z "${VM_SSH_PUBLIC_KEY:-}" ]; then
            echo "VM_SSH_PUBLIC_KEY not provided. Launch will continue without SSH key metadata."
          fi

      - name: Configure OCI CLI
        run: |
          set -euo pipefail
          mkdir -p ~/.oci

          trim_quotes_spaces() {
            printf '%s' "$1" \
              | tr -d '\r' \
              | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' \
                    -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//"
          }

          extract_ocid() {
            printf '%s' "$1" | tr -d '\r' | grep -Eo "ocid1\.$2\.[A-Za-z0-9._:-]+" | head -n 1 || true
          }

          extract_fingerprint() {
            printf '%s' "$1" | tr -d '\r' | grep -Eio '([0-9a-f]{2}:){15}[0-9a-f]{2}' | head -n 1 || true
          }

          extract_region() {
            printf '%s' "$1" | tr -d '\r' | grep -Eio '[a-z]{2}-[a-z0-9-]+-[0-9]+' | head -n 1 || true
          }

          if [ -n "${OCI_CONFIG_SECRET:-}" ] && [ -n "${OCI_KEY_FILE_SECRET:-}" ]; then
            cfg_content=$(printf '%s' "$OCI_CONFIG_SECRET" | tr -d '\r')
            key_content=$(printf '%s' "$OCI_KEY_FILE_SECRET" | tr -d '\r')

            if printf '%s' "$cfg_content" | grep -q '\\n'; then
              cfg_content=$(printf '%b' "$cfg_content")
            fi
            if printf '%s' "$key_content" | grep -q '\\n'; then
              key_content=$(printf '%b' "$key_content")
            fi

            printf '%s\n' "$cfg_content" > ~/.oci/config
            printf '%s\n' "$key_content" > ~/.oci/oci_api_key.pem

            if grep -q '^key_file=' ~/.oci/config; then
              sed -i 's|^key_file=.*|key_file=~/.oci/oci_api_key.pem|' ~/.oci/config
            else
              printf '%s\n' 'key_file=~/.oci/oci_api_key.pem' >> ~/.oci/config
            fi
          else
            raw_user=$(trim_quotes_spaces "${OCI_USER_OCID:-}")
            raw_tenancy=$(trim_quotes_spaces "${OCI_TENANCY_OCID:-}")
            raw_region=$(trim_quotes_spaces "${OCI_REGION:-}")
            raw_fingerprint=$(trim_quotes_spaces "${OCI_FINGERPRINT:-}")
            raw_private_key=$(printf '%s' "${OCI_PRIVATE_KEY:-}" | tr -d '\r')

            user_ocid=$(extract_ocid "$raw_user" user)
            tenancy_ocid=$(extract_ocid "$raw_tenancy" tenancy)
            region=$(extract_region "$raw_region")
            fingerprint=$(extract_fingerprint "$raw_fingerprint")
            private_key=$(printf '%s' "$raw_private_key")

            if printf '%s' "$private_key" | grep -q '\\n'; then
              private_key=$(printf '%b' "$private_key")
            fi

            if [ -z "$tenancy_ocid" ] || [ -z "$user_ocid" ] || [ -z "$region" ] || [ -z "$fingerprint" ] || [ -z "$private_key" ]; then
              echo "Split OCI secrets invalid or incomplete."
              exit 1
            fi

            printf '%s\n' "$private_key" > ~/.oci/oci_api_key.pem
            {
              printf '%s\n' '[DEFAULT]'
              printf 'user=%s\n' "$user_ocid"
              printf 'fingerprint=%s\n' "$fingerprint"
              printf 'tenancy=%s\n' "$tenancy_ocid"
              printf 'region=%s\n' "$region"
              printf '%s\n' 'key_file=~/.oci/oci_api_key.pem'
            } > ~/.oci/config
          fi

          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem
          oci setup repair-file-permissions --file ~/.oci/config >/dev/null 2>&1 || true
          oci setup repair-file-permissions --file ~/.oci/oci_api_key.pem >/dev/null 2>&1 || true
          oci iam region list --max-retries 0 --output table >/dev/null

      - name: Launch ARM Instance If None Exists
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          disable_workflow() {
            echo "Disabling workflow (capacity achieved)."
            curl -fsS -X PUT \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/main.yml/disable" >/dev/null || true
          }

          METADATA_JSON=''
          if [ -n "${VM_SSH_PUBLIC_KEY:-}" ]; then
            SSH_PUBLIC_KEY_CLEAN=$(printf '%s' "$VM_SSH_PUBLIC_KEY" | tr -d '\r')
            if printf '%s' "$SSH_PUBLIC_KEY_CLEAN" | grep -q '\\n'; then
              SSH_PUBLIC_KEY_CLEAN=$(printf '%b' "$SSH_PUBLIC_KEY_CLEAN")
            fi
            SSH_PUBLIC_KEY_CLEAN=$(printf '%s' "$SSH_PUBLIC_KEY_CLEAN" | tr -d '\n')

            if printf '%s' "$SSH_PUBLIC_KEY_CLEAN" | grep -qE '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-nistp256) '; then
              export SSH_PUBLIC_KEY_CLEAN
              METADATA_JSON=$(python3 -c 'import json, os; print(json.dumps({"ssh_authorized_keys": os.environ["SSH_PUBLIC_KEY_CLEAN"]}))')
            else
              echo "VM_SSH_PUBLIC_KEY format invalid; continuing without SSH metadata."
            fi
          fi

          TENANCY_OCID=$(awk -F= '/^tenancy=/{print $2; exit}' ~/.oci/config | tr -d '[:space:]')
          if [ -z "$TENANCY_OCID" ]; then
            echo "Could not determine tenancy OCID from ~/.oci/config"
            exit 1
          fi

          if [ -z "${COMPARTMENT_ID:-}" ]; then
            COMPARTMENT_ID="$TENANCY_OCID"
            echo "Using tenancy as fallback COMPARTMENT_ID: ${COMPARTMENT_ID:0:22}..."
          fi

          if [ -z "${SUBNET_ID:-}" ]; then
            echo "Trying to auto-discover a public subnet from compartment ${COMPARTMENT_ID}..."
            subnet_json=$(oci network subnet list --max-retries 0 --compartment-id "$COMPARTMENT_ID" --all --output json)
            SUBNET_ID=$(printf '%s' "$subnet_json" | python3 -c "import json,sys; d=json.load(sys.stdin).get('data',[]); c=[s.get('id') for s in d if s.get('lifecycle-state')=='AVAILABLE' and not s.get('prohibit-public-ip-on-vnic', True)]; print(c[0] if c else '')")

            if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "null" ]; then
              echo "No suitable public subnet found. Set SUBNET_ID secret/variable explicitly."
              exit 1
            fi
            echo "Auto-discovered SUBNET_ID: ${SUBNET_ID:0:22}..."
          fi

          EXISTING_JSON=$(oci compute instance list --max-retries 0 --compartment-id "$COMPARTMENT_ID" --all --output json)
          existing_arm_count=$(printf '%s' "$EXISTING_JSON" | python3 -c "import json,sys; active={'PROVISIONING','STARTING','RUNNING','STOPPING','STOPPED'}; d=json.load(sys.stdin).get('data',[]); print(sum(1 for i in d if i.get('display-name')=='Binance-Bot-ARM-Ubuntu24' and i.get('lifecycle-state') in active))")

          if [ "${existing_arm_count:-0}" -gt 0 ]; then
            echo "Existing ARM bot instance detected (${existing_arm_count})."
            disable_workflow
            exit 0
          fi

          AD_JSON=$(oci iam availability-domain list --max-retries 0 --compartment-id "$TENANCY_OCID" --output json)
          AD_LIST=$(printf '%s' "$AD_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\\n'.join([x.get('name','') for x in d.get('data',[]) if x.get('name')]))")

          if [ -z "$AD_LIST" ]; then
            echo "Could not fetch availability domains."
            exit 1
          fi

          echo "AD candidates:"
          echo "$AD_LIST"

          shape="VM.Standard.A1.Flex"
          shape_cfg='{"ocpus": 4, "memoryInGBs": 24}'
          display_name="Binance-Bot-ARM-Ubuntu24"

          image_id=$(oci compute image list \
            --max-retries 0 \
            --compartment-id "$TENANCY_OCID" \
            --all \
            --shape "$shape" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "24.04" \
            --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE'], &\"time-created\"))[0].id" \
            --raw-output)

          if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
            image_id=$(oci compute image list \
              --max-retries 0 \
              --compartment-id "$TENANCY_OCID" \
              --all \
              --shape "$shape" \
              --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE' && contains(\"display-name\", 'Ubuntu') && contains(\"display-name\", '24.04')], &\"time-created\"))[0].id" \
              --raw-output)
          fi

          if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
            echo "No Ubuntu 24 image found for ARM shape."
            exit 1
          fi

          echo "Resolved image for ARM: ${image_id:0:42}..."

          launched=0
          while IFS= read -r ad; do
            [ -z "$ad" ] && continue
            echo "Trying arm in AD: $ad"

            cmd=(oci compute instance launch
              --max-retries 0
              --availability-domain "$ad"
              --compartment-id "$COMPARTMENT_ID"
              --shape "$shape"
              --display-name "$display_name"
              --source-details "{\"image_id\": \"$image_id\", \"source_type\": \"image\"}"
              --subnet-id "$SUBNET_ID"
              --assign-public-ip true
              --shape-config "$shape_cfg")

            if [ -n "$METADATA_JSON" ]; then
              cmd+=(--metadata "$METADATA_JSON")
            fi

            set +e
            output=$("${cmd[@]}" 2>&1)
            code=$?
            set -e

            if [ "$code" -eq 0 ]; then
              echo "Launch SUCCESS (arm, $ad)"
              echo "$output"
              launched=1
              break
            fi

            echo "Launch failed (arm, $ad):"
            echo "$output"

            if echo "$output" | grep -qiE 'OutOfHostCapacity|Out of host capacity|Out of capacity'; then
              echo "Capacity yok, sonraki AD denenecek."
              continue
            fi

            if echo "$output" | grep -qiE 'LimitExceeded|TooManyRequests'; then
              echo "Limit hatasi, sonraki AD denenecek."
              continue
            fi

            if echo "$output" | grep -qiE 'RequestException|connection to endpoint timed out|timed out|Connection timed out'; then
              echo "Gecici timeout, sonraki AD denenecek."
              continue
            fi

            echo "Beklenmeyen hata nedeniyle workflow fail ediliyor."
            exit "$code"
          done <<< "$AD_LIST"

          if [ "$launched" -eq 1 ]; then
            echo "ARM target launched successfully."
            disable_workflow
            exit 0
          fi

          echo "No ARM capacity now (or transient OCI timeouts)."
          exit 0
