name: Oracle Capacity Hunter

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  hunt-capacity:
    runs-on: ubuntu-latest
    environment: Oracle
    env:
      SUBNET_ID: ${{ secrets.SUBNET_ID }}
      COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID }}
      SUPPRESS_LABEL_WARNING: true
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

    steps:
      - name: Install OCI CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          normalize() {
            # Trim whitespace/newlines and remove wrapping single or double quotes.
            printf '%s' "$1" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//"
          }

          user_ocid=$(normalize "${OCI_USER_OCID:-}")
          tenancy_ocid=$(normalize "${OCI_TENANCY_OCID:-}")
          region=$(normalize "${OCI_REGION:-}")
          fingerprint=$(normalize "${OCI_FINGERPRINT:-}")
          private_key=$(printf '%s' "${OCI_PRIVATE_KEY:-}" | tr -d '\r')

          # Normalize fingerprint for validation/write.
          fingerprint=$(printf '%s' "$fingerprint" | tr 'A-F' 'a-f')

          if ! printf '%s' "$tenancy_ocid" | grep -Eq '^ocid1\.tenancy\..+'; then
            echo "Invalid OCI_TENANCY_OCID secret format. Expected an OCID like ocid1.tenancy...."
            exit 1
          fi

          if ! printf '%s' "$user_ocid" | grep -Eq '^ocid1\.user\..+'; then
            echo "Invalid OCI_USER_OCID secret format. Expected an OCID like ocid1.user...."
            exit 1
          fi

          if ! printf '%s' "$fingerprint" | grep -Eq '^([0-9a-f]{2}:){15}[0-9a-f]{2}$'; then
            echo "Invalid OCI_FINGERPRINT format. Expected 16 hex byte pairs separated by ':'"
            exit 1
          fi

          if [ -z "$region" ]; then
            echo "OCI_REGION is empty."
            exit 1
          fi

          if [ -z "$private_key" ]; then
            echo "OCI_PRIVATE_KEY is empty."
            exit 1
          fi

          mkdir -p ~/.oci
          printf '%s\n' "$private_key" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<CFG
          [DEFAULT]
          user=$user_ocid
          fingerprint=$fingerprint
          tenancy=$tenancy_ocid
          region=$region
          key_file=~/.oci/oci_api_key.pem
          CFG

          chmod 600 ~/.oci/config

          # Fast sanity check before main launch logic.
          oci iam region list --output table >/dev/null

      - name: Launch ARM Instance If None Exists
        run: |
          set -euo pipefail

          TENANCY_OCID=$(awk -F= '/^tenancy=/{print $2; exit}' ~/.oci/config | tr -d '[:space:]')
          if [ -z "$TENANCY_OCID" ]; then
            echo "Could not determine tenancy OCID from ~/.oci/config"
            exit 1
          fi

          # Only ARM dedupe check: AMD instance existence should not block ARM hunt.
          EXISTING_JSON=$(oci compute instance list --compartment-id "$COMPARTMENT_ID" --all --output json)
          existing_arm_count=$(printf '%s' "$EXISTING_JSON" | python3 -c "import json,sys; active={'PROVISIONING','STARTING','RUNNING','STOPPING','STOPPED'}; d=json.load(sys.stdin).get('data',[]); print(sum(1 for i in d if i.get('display-name')=='Binance-Bot-ARM-Ubuntu24' and i.get('lifecycle-state') in active))")

          if [ "${existing_arm_count:-0}" -gt 0 ]; then
            echo "Existing ARM bot instance detected (${existing_arm_count}). Skipping new ARM launch."
            exit 0
          fi

          AD_JSON=$(oci iam availability-domain list --compartment-id "$TENANCY_OCID" --output json)
          AD_LIST=$(printf '%s' "$AD_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\\n'.join([x.get('name','') for x in d.get('data',[]) if x.get('name')]))")

          if [ -z "$AD_LIST" ]; then
            echo "Could not fetch availability domains."
            exit 1
          fi

          echo "AD candidates:"
          echo "$AD_LIST"

          target="arm"
          shape="VM.Standard.A1.Flex"
          shape_cfg='{"ocpus": 4, "memoryInGBs": 24}'
          display_name="Binance-Bot-ARM-Ubuntu24"

          echo "=== Target: $target / Shape: $shape ==="

          image_id=$(oci compute image list \
            --compartment-id "$TENANCY_OCID" \
            --all \
            --shape "$shape" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "24.04" \
            --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE'], &\"time-created\"))[0].id" \
            --raw-output)

          if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
            echo "Strict Ubuntu 24.04 image not found, trying fallback filter..."
            image_id=$(oci compute image list \
              --compartment-id "$TENANCY_OCID" \
              --all \
              --shape "$shape" \
              --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE' && contains(\"display-name\", 'Ubuntu') && contains(\"display-name\", '24.04')], &\"time-created\"))[0].id" \
              --raw-output)
          fi

          if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
            echo "No Ubuntu 24 image found for ARM shape."
            exit 1
          fi

          echo "Resolved image for ARM: ${image_id:0:42}..."

          set +e
          oci compute image get --image-id "$image_id" >/tmp/image_get_arm.json 2>/tmp/image_get_arm.err
          img_code=$?
          set -e
          if [ "$img_code" -ne 0 ]; then
            echo "Resolved ARM image invalid:"
            cat /tmp/image_get_arm.err || true
            exit 1
          fi

          launched=0
          while IFS= read -r ad; do
            [ -z "$ad" ] && continue
            echo "Trying $target in AD: $ad"

            cmd=(oci compute instance launch
              --availability-domain "$ad"
              --compartment-id "$COMPARTMENT_ID"
              --shape "$shape"
              --display-name "$display_name"
              --source-details "{\"image_id\": \"$image_id\", \"source_type\": \"image\"}"
              --subnet-id "$SUBNET_ID"
              --assign-public-ip true
              --shape-config "$shape_cfg")

            set +e
            output=$("${cmd[@]}" 2>&1)
            code=$?
            set -e

            if [ "$code" -eq 0 ]; then
              echo "Launch SUCCESS ($target, $ad)"
              echo "$output"
              launched=1
              break
            fi

            echo "Launch failed ($target, $ad):"
            echo "$output"

            if echo "$output" | grep -qiE 'OutOfHostCapacity|Out of host capacity|Out of capacity'; then
              echo "Capacity yok, sonraki AD denenecek."
              continue
            fi

            if echo "$output" | grep -qiE 'LimitExceeded|TooManyRequests'; then
              echo "Gecici/limit kaynakli hata, sonraki AD denenecek."
              continue
            fi

            echo "Beklenmeyen hata nedeniyle workflow fail ediliyor."
            exit "$code"
          done <<< "$AD_LIST"

          if [ "$launched" -eq 1 ]; then
            echo "ARM target launched successfully."
            exit 0
          fi

          echo "No ARM capacity now. Workflow basarili bitti, 5 dk sonra tekrar denenecek."
          exit 0
