name: Oracle ARM Hunter
on:
  schedule:
    - cron: '*/5 * * * *' # 5 dakikada bir Frankfurt kapısını yumruklar
  workflow_dispatch:

jobs:
  hunt-arm:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults
          echo "/home/runner/bin" >> $GITHUB_PATH

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/key.pem
          sed -i 's|key_file=.*|key_file=/home/runner/.oci/key.pem|' ~/.oci/config

      - name: Try Create ARM Instance
        env:
          MY_IMAGE_ID: ${{ secrets.IMAGE_ID }}
          MY_SUBNET_ID: ${{ secrets.SUBNET_ID }}
          MY_COMP_ID: ${{ secrets.COMPARTMENT_ID }}
        run: |
          oci compute instance launch \
            --availability-domain "UvXp:EU-FRANKFURT-1-AD-1" \
            --compartment-id "$MY_COMP_ID" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --display-name "Binance-Bot-ARM-Master" \
            --image-id "$MY_IMAGE_ID" \
            --subnet-id "$MY_SUBNET_ID" \
            --assign-public-ip true \
            --wait-for-state RUNNING
