name: Oracle Capacity Hunter

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  hunt-capacity:
    runs-on: ubuntu-latest
    environment: Oracle
    env:
      SUBNET_ID: ${{ secrets.SUBNET_ID }}
      COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID }}
      SUPPRESS_LABEL_WARNING: true

    steps:
      - name: Install OCI CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<CFG
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=~/.oci/oci_api_key.pem
          CFG

          oci iam region list --output table >/dev/null

      - name: Launch Oracle Instance If None Exists
        run: |
          set -euo pipefail

          TENANCY_OCID=$(awk -F= '/^tenancy=/{print $2; exit}' ~/.oci/config | tr -d '[:space:]')
          if [ -z "$TENANCY_OCID" ]; then
            echo "Could not determine tenancy OCID from ~/.oci/config"
            exit 1
          fi

          # Prevent duplicate machine creation: if a bot instance already exists and is not terminated, skip launch.
          EXISTING_JSON=$(oci compute instance list --compartment-id "$COMPARTMENT_ID" --all --output json)
          existing_count=$(printf '%s' "$EXISTING_JSON" | python3 -c "import json,sys; names={'Binance-Bot-ARM-Ubuntu24','Binance-Bot-AMD-Free-Ubuntu24'}; active={'PROVISIONING','STARTING','RUNNING','STOPPING','STOPPED'}; d=json.load(sys.stdin).get('data',[]); print(sum(1 for i in d if i.get('display-name') in names and i.get('lifecycle-state') in active))")

          if [ "${existing_count:-0}" -gt 0 ]; then
            echo "Existing bot instance detected (${existing_count}). Skipping new launch to avoid duplicates."
            exit 0
          fi

          AD_JSON=$(oci iam availability-domain list --compartment-id "$TENANCY_OCID" --output json)
          AD_LIST=$(printf '%s' "$AD_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print('\\n'.join([x.get('name','') for x in d.get('data',[]) if x.get('name')]))")

          if [ -z "$AD_LIST" ]; then
            echo "Could not fetch availability domains."
            exit 1
          fi

          echo "AD candidates:"
          echo "$AD_LIST"

          # target|shape|shape_config|display_name
          TARGETS=$(printf '%s\n' \
            'arm|VM.Standard.A1.Flex|{"ocpus": 4, "memoryInGBs": 24}|Binance-Bot-ARM-Ubuntu24' \
            'amd|VM.Standard.E2.1.Micro||Binance-Bot-AMD-Free-Ubuntu24')

          launched=0
          image_missing_count=0

          while IFS='|' read -r target shape shape_cfg display_name; do
            [ -z "$target" ] && continue
            echo "=== Target: $target / Shape: $shape ==="

            # 1) Strict search: Ubuntu 24.04 + shape compatible
            image_id=$(oci compute image list \
              --compartment-id "$TENANCY_OCID" \
              --all \
              --shape "$shape" \
              --operating-system "Canonical Ubuntu" \
              --operating-system-version "24.04" \
              --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE'], &\"time-created\"))[0].id" \
              --raw-output)

            # 2) Fallback search: display-name contains Ubuntu and 24.04
            if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
              echo "Strict Ubuntu 24.04 image not found, trying fallback filter..."
              image_id=$(oci compute image list \
                --compartment-id "$TENANCY_OCID" \
                --all \
                --shape "$shape" \
                --query "reverse(sort_by(data[?\"lifecycle-state\"=='AVAILABLE' && contains(\"display-name\", 'Ubuntu') && contains(\"display-name\", '24.04')], &\"time-created\"))[0].id" \
                --raw-output)
            fi

            if [ -z "$image_id" ] || [ "$image_id" = "null" ]; then
              echo "No Ubuntu 24 image found for shape: $shape (target=$target)."
              image_missing_count=$((image_missing_count + 1))
              continue
            fi

            echo "Resolved image for $target: ${image_id:0:42}..."

            # Sanity validation
            set +e
            oci compute image get --image-id "$image_id" >/tmp/image_get_${target}.json 2>/tmp/image_get_${target}.err
            img_code=$?
            set -e
            if [ "$img_code" -ne 0 ]; then
              echo "Resolved image invalid for $target:"
              cat /tmp/image_get_${target}.err || true
              image_missing_count=$((image_missing_count + 1))
              continue
            fi

            # Try all ADs for this target
            target_launched=0
            while IFS= read -r ad; do
              [ -z "$ad" ] && continue
              echo "Trying $target in AD: $ad"

              cmd=(oci compute instance launch
                --availability-domain "$ad"
                --compartment-id "$COMPARTMENT_ID"
                --shape "$shape"
                --display-name "$display_name"
                --source-details "{\"image_id\": \"$image_id\", \"source_type\": \"image\"}"
                --subnet-id "$SUBNET_ID"
                --assign-public-ip true)

              if [ -n "$shape_cfg" ]; then
                cmd+=(--shape-config "$shape_cfg")
              fi

              set +e
              output=$("${cmd[@]}" 2>&1)
              code=$?
              set -e

              if [ "$code" -eq 0 ]; then
                echo "Launch SUCCESS ($target, $ad)"
                echo "$output"
                launched=1
                target_launched=1
                break
              fi

              echo "Launch failed ($target, $ad):"
              echo "$output"

              if echo "$output" | grep -qiE 'OutOfHostCapacity|Out of host capacity|Out of capacity'; then
                echo "Capacity yok, sonraki AD denenecek."
                continue
              fi

              if echo "$output" | grep -qiE 'LimitExceeded|TooManyRequests'; then
                echo "Gecici/limit kaynakli hata, sonraki AD denenecek."
                continue
              fi

              echo "Beklenmeyen hata nedeniyle workflow fail ediliyor."
              exit "$code"
            done <<< "$AD_LIST"

            if [ "$target_launched" -eq 1 ]; then
              # Bir hedefte basarili olunca digerini denemeye gerek yok
              break
            fi
          done <<< "$TARGETS"

          if [ "$launched" -eq 1 ]; then
            echo "At least one target launched successfully."
            exit 0
          fi

          if [ "$image_missing_count" -ge 2 ]; then
            echo "Neither ARM nor AMD target could find Ubuntu 24 image. Check region/image availability."
            exit 1
          fi

          echo "No capacity now. Workflow basarili bitti, 5 dk sonra tekrar denenecek."
          exit 0
